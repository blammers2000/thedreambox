<!DOCTYPE html>
<html>
<head>
    <title>Enrich Local JSON (add titles)</title>
    <style>
        body { background: #0c0d1f; color: #fff; font-family: monospace; padding: 20px; }
        input, button { background: #1e1f3a; color: #5be8f9; border: 1px solid #d26cf3; padding: 8px; margin: 5px; border-radius: 8px; }
        button:hover { background: #d26cf3; color: #0c0d1f; }
        pre { background: #000; padding: 10px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>
<h2>Add Video Titles to JSON File</h2>
<p>Select a JSON file containing an array of video IDs (e.g., <code>["id1","id2"]</code>). It will fetch titles and save an enriched file with <code>[{"id":"...","title":"..."}]</code>.</p>
<input type="file" id="fileInput" accept=".json">
<button id="enrichBtn">Enrich & Download</button>
<div id="log"></div>
<script>
const API_KEY = 'AIzaSyAZKamrcHaJPk29dNx0U58gudRPlvxWtJI'; // Replace if needed

async function fetchTitlesForBatch(videoIds) {
    if (!videoIds.length) return [];
    const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoIds.join(',')}&key=${API_KEY}`;
    const response = await fetch(url);
    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    const titleMap = {};
    if (data.items) {
        data.items.forEach(item => { titleMap[item.id] = item.snippet.title; });
    }
    return videoIds.map(id => ({ id, title: titleMap[id] || `Unknown (${id.slice(0,8)}...)` }));
}

document.getElementById('enrichBtn').onclick = async () => {
    const file = document.getElementById('fileInput').files[0];
    const logDiv = document.getElementById('log');
    if (!file) { alert('Select a file'); return; }
    logDiv.innerHTML = `Processing ${file.name}...`;
    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const ids = JSON.parse(e.target.result);
            if (!Array.isArray(ids)) throw new Error('Not an array');
            const enriched = [];
            for (let i = 0; i < ids.length; i += 50) {
                const chunk = ids.slice(i, i+50);
                const enrichedChunk = await fetchTitlesForBatch(chunk);
                enriched.push(...enrichedChunk);
                logDiv.innerHTML = `Fetched titles for ${i+chunk.length}/${ids.length}`;
            }
            const blob = new Blob([JSON.stringify(enriched, null, 2)], {type: 'application/json'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = file.name.replace('.json', '_enriched.json');
            link.click();
            logDiv.innerHTML = `✅ Saved ${enriched.length} videos.`;
        } catch (err) {
            logDiv.innerHTML = `❌ Error: ${err.message}`;
        }
    };
    reader.readAsText(file);
};
</script>
</body>
</html>

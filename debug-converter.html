<!DOCTYPE html>
<html>
<head>
    <title>Debug Playlist API</title>
    <style>
        body { background: #0c0d1f; color: #fff; font-family: monospace; padding: 20px; }
        button { background: #d26cf3; color: #0c0d1f; padding: 8px 16px; margin: 10px; cursor: pointer; }
        pre { background: #000; padding: 10px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>
<h2>Debug YouTube Playlist API</h2>
<p>Enter a playlist ID and click "Debug". The raw JSON response will be shown below.</p>
<input type="text" id="playlistId" size="60" value="PLm0x3HD8x6CP3no0izE7AreCY4pcIr5_7">
<button id="debugBtn">Debug</button>
<pre id="output"></pre>
<script>
const API_KEY = 'AIzaSyAZKamrcHaJPk29dNx0U58gudRPlvxWtJI';

document.getElementById('debugBtn').onclick = async () => {
    const playlistId = document.getElementById('playlistId').value.trim();
    const output = document.getElementById('output');
    output.textContent = 'Fetching...';
    try {
        const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=contentDetails&maxResults=10&playlistId=${playlistId}&key=${API_KEY}`;
        const response = await fetch(url);
        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);
    } catch (err) {
        output.textContent = `Error: ${err.message}`;
    }
};
</script>
</body>
</html>
